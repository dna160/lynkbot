# Railway config for lynkbot-api
# Optional — use this for the health check and explicit deploy settings.
#
# In Railway dashboard: lynkbot-api → Settings → Source → Config Path
# Set to: infra/api.railway.toml
#
# Root Directory must be empty (repo root) — Docker context needs the full monorepo.

[build]
builder = "DOCKERFILE"
# Uses root Dockerfile (default SERVICE=api — no build arg needed)

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
