# Railway service config for lynkbot-worker
#
# HOW TO ACTIVATE:
#   Railway dashboard → lynkbot-worker → Settings → Source → Config Path
#   Set to: infra/worker.railway.toml
#
# Also ensure:
#   - Source Repo: dna160/lynkbot
#   - Root Directory: (empty — build context is repo root, required for turbo prune)

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/worker/Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
