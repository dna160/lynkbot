# Railway config for lynkbot-worker
#
# OPTION A — Config Path (explicit, recommended):
#   Railway dashboard → lynkbot-worker → Settings → Source → Config Path
#   Set to: infra/worker.railway.toml
#
# OPTION B — Build Variable only (simpler):
#   Railway dashboard → lynkbot-worker → Variables → Add variable:
#   Key: SERVICE  Value: worker  (toggle Build Variable ON)
#   No Config Path needed. Root Dockerfile + SERVICE=worker build arg is sufficient.

[build]
builder = "DOCKERFILE"
# Uses root Dockerfile with SERVICE=worker.
# Also set SERVICE=worker as a Build Variable in the Railway dashboard.

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
