# LynkBot Railway deployment configuration — MVP
# Three services: API (HTTP) + Worker (background jobs) + Dashboard (static SPA)
# Database and Redis are Railway managed services

[build]
builder = "DOCKERFILE"

[[services]]
name = "lynkbot-api"
source = "."
dockerfile = "apps/api/Dockerfile"

[services.deploy]
startCommand = "node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "lynkbot-worker"
source = "."
dockerfile = "apps/worker/Dockerfile"

[services.deploy]
startCommand = "node dist/index.js"
restartPolicyType = "ALWAYS"

[[services]]
name = "lynkbot-dashboard"
source = "."
dockerfile = "apps/dashboard/Dockerfile"

[services.deploy]
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
